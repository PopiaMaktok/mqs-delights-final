<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | MQS Delights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0D0D0D; color: white; }
        .bg-glass { background: rgba(13, 13, 13, 0.8); backdrop-filter: blur(12px); }
        .orange-glow { box-shadow: 0 0 20px rgba(255, 140, 0, 0.2); }
        .btn-premium { background: #FF8C00; transition: all 0.3s ease; }
        .btn-premium:hover { background: #e67e00; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 140, 0, 0.4); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="fixed top-0 w-full z-50 bg-glass border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="../index.html" class="text-2xl font-extrabold tracking-tighter">MQS <span class="text-[#FF8C00]">DELIGHTS</span></a>
            <div class="flex items-center gap-6">
                <a href="menu.html" class="text-xs font-bold uppercase tracking-widest border border-gray-700 px-4 py-2 rounded-full hover:bg-white hover:text-black transition">Add More Food</a>
            </div>
        </div>
    </nav>

    <header class="pt-32 pb-12 text-center">
        <h3 class="text-[#FF8C00] font-bold text-xs uppercase tracking-widest mb-2">Checkout Process</h3>
        <h1 class="text-5xl font-black italic">YOUR <span class="text-[#FF8C00]">CART</span></h1>
        <p class="text-gray-500 text-sm mt-4">Review your selection of premium grills.</p>
    </header>

    <main class="max-w-4xl mx-auto px-6">
        <div id="cart-items" class="space-y-4 mb-10">
            <div class="border border-dashed border-gray-800 rounded-3xl p-12 text-center">
                <p class="text-gray-600 mb-4 italic">"Hey.. Your cart is a bit empty don't you think?"</p>
                <a href="menu.html" class="text-[#FF8C00] font-bold hover:underline">Let's Get Some Food!</a>
            </div>
        </div>

        <div class="bg-[#151515] border border-gray-800 rounded-3xl p-8 orange-glow">
            <div class="flex justify-between items-center mb-8">
                <span class="text-gray-400 font-bold uppercase tracking-widest text-xs">Total Payment:</span>
                <span id="total-price" class="text-3xl font-black text-[#FF8C00]">RM 0.00</span>
            </div>
            
            <button id="checkout-btn" class="w-full btn-premium text-black font-black py-4 rounded-2xl uppercase tracking-widest text-sm">
                Proceed To Checkout
            </button>
            
            <p class="text-center text-[10px] text-gray-600 mt-4 uppercase tracking-widest">
                *Earn 10 points for every RM1 spent
            </p>
        </div>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
