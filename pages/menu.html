<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | MQS Delights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0D0D0D; color: white; }
        .bg-glass { background: rgba(13, 13, 13, 0.8); backdrop-filter: blur(12px); }
        .orange-glow:hover { box-shadow: 0 0 20px rgba(255, 140, 0, 0.3); }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed top-0 w-full z-50 bg-glass border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="../index.html" class="text-2xl font-extrabold tracking-tighter">MQS <span class="text-[#FF8C00]">DELIGHTS</span></a>
            <div class="flex items-center gap-6">
                <a href="cart.html" class="relative group">
                    <span class="text-sm font-bold group-hover:text-[#FF8C00]">CART</span>
                    <span id="cart-count" class="absolute -top-2 -right-4 bg-[#FF8C00] text-black text-[10px] font-bold px-1.5 rounded-full">0</span>
                </a>
                <a href="../index.html" class="text-xs font-bold uppercase tracking-widest border border-gray-700 px-4 py-2 rounded-full hover:bg-white hover:text-black transition">Back to Home</a>
            </div>
        </div>
    </nav>

    <header class="pt-32 pb-12 text-center">
        <h3 class="text-[#FF8C00] font-bold text-xs uppercase tracking-widest mb-2">Our Offerings</h3>
        <h1 class="text-5xl font-black italic">THE <span class="text-[#FF8C00]">MENU</span></h1>
    </header>

    <main class="max-w-7xl mx-auto px-6">
        <div id="menu-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="animate-pulse bg-gray-900 h-80 rounded-3xl"></div>
            <div class="animate-pulse bg-gray-900 h-80 rounded-3xl"></div>
            <div class="animate-pulse bg-gray-900 h-80 rounded-3xl"></div>
        </div>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/main.js"></script>
    <script>
        // Script tambahan untuk pastikan navbar nampak cantik
        window.addEventListener('scroll', () => {
            const nav = document.querySelector('nav');
            if (window.scrollY > 50) nav.classList.add('py-2');
            else nav.classList.remove('py-2');
        });
    </script>
</body>
</html>
